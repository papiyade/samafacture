<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SamaFacture - Application PWA de facturation et devis pour TPE/PME">
    <meta name="theme-color" content="#3b82f6">
    <title>SamaFacture - Facturation & Devis</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="SamaFacture">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="../shared/styles/main.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 font-sans antialiased">
    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 bg-white dark:bg-gray-900 flex items-center justify-center z-50">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary-600 mx-auto mb-4"></div>
            <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-2">SamaFacture</h2>
            <p class="text-gray-600 dark:text-gray-400">Chargement en cours...</p>
        </div>
    </div>

    <!-- App Container -->
    <div id="app" class="hidden min-h-screen">
        <!-- Navigation will be injected here -->
        <nav id="navigation"></nav>
        
        <!-- Main Content -->
        <main id="main-content" class="transition-all duration-300">
            <!-- Page content will be injected here -->
        </main>
        
        <!-- Modals Container -->
        <div id="modals-container"></div>
        
        <!-- Notifications Container -->
        <div id="notifications-container" class="fixed top-4 right-4 z-50"></div>
        
        <!-- Offline Indicator -->
        <div id="offline-indicator" class="hidden fixed bottom-4 left-4 bg-yellow-500 text-white px-4 py-2 rounded-lg shadow-lg">
            <span class="flex items-center">
                <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                </svg>
                Mode hors ligne
            </span>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="./main.js"></script>
</body>
</html>
