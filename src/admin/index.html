<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SamaFacture Admin - Dashboard de gestion centralisée">
    <title>SamaFacture Admin - Dashboard</title>
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="../shared/styles/main.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 font-sans antialiased">
    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 bg-white dark:bg-gray-900 flex items-center justify-center z-50">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary-600 mx-auto mb-4"></div>
            <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-2">SamaFacture Admin</h2>
            <p class="text-gray-600 dark:text-gray-400">Chargement du dashboard...</p>
        </div>
    </div>

    <!-- App Container -->
    <div id="admin-app" class="hidden min-h-screen">
        <!-- Admin Navigation -->
        <nav id="admin-navigation"></nav>
        
        <!-- Main Content -->
        <main id="admin-main-content" class="transition-all duration-300">
            <!-- Admin page content will be injected here -->
        </main>
        
        <!-- Modals Container -->
        <div id="admin-modals-container"></div>
        
        <!-- Notifications Container -->
        <div id="admin-notifications-container" class="fixed top-4 right-4 z-50"></div>
    </div>

    <!-- Scripts -->
    <script type="module" src="./admin.js"></script>
</body>
</html>
